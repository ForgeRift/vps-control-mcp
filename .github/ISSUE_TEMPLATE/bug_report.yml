name: Bug Report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the sections below.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: When I asked Claude to check pm2 status, it returned stale data instead of the current process list.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
      placeholder: Claude should have called get_pm2_status and returned the current process table.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Connect vps-control-mcp via Claude Desktop / Cowork
        2. Ask: "What's running on pm2?"
        3. Claude returns a cached or incorrect response
    validations:
      required: true

  - type: dropdown
    id: tool
    attributes:
      label: Which tool was involved?
      options:
        - run_approved_command
        - get_pm2_status
        - get_system_health
        - get_recent_errors
        - read_file_section
        - search_file
        - git_status
        - git_log
        - git_pull
        - git_push
        - restart_process
        - deploy
        - Not tool-specific / install issue
        - Not sure
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Plugin version
      description: Check setup.sh header or package.json for the version number.
      placeholder: v1.8.0
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: VPS OS / distro
      placeholder: Ubuntu 22.04 LTS
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Paste any relevant lines from pm2 logs, audit.log, or the MCP server stderr.
      render: text
