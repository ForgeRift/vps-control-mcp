name: Security Issue
description: Report a potential security bypass or vulnerability (non-sensitive issues only — for sensitive findings use SECURITY.md)
labels: ["security"]
body:
  - type: markdown
    attributes:
      value: |
        Before submitting: If this finding could be actively exploited to cause harm, please follow the private disclosure process in [SECURITY.md](../SECURITY.md) instead of opening a public issue.

        This template is for low-severity observations (e.g. a blocked command that should have a better error message, a missing pattern you noticed, a documentation gap in the security model).

  - type: textarea
    id: description
    attributes:
      label: What did you observe?
      description: Describe what you found. Do not include an actual working exploit here.
      placeholder: The AMBER warning for a particular pm2 command fires but the message doesn't explain the impact.
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: How would you rate the severity?
      options:
        - Low — cosmetic / documentation gap
        - Medium — behavior gap, not exploitable
        - High — potential bypass (use private disclosure if actively exploitable)
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Plugin version
      placeholder: v1.8.0
    validations:
      required: true
